<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/1080.ico">
    <title>iFixLabs | Professional iPhone & Gadget Repair</title>
    <meta property="og:description" content="On-Site Services iPhone Specialist.">
    <meta name="description" content="One to one repair in front of eyes. Fast service, quality parts, and specialized in iPhone repair. WhatsApp us today!">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            black: '#1A122E',
                            purple: '#7C5DFA',
                            'light-purple': '#F3F0FF',
                            accent: '#9277FF',
                            gray: '#373B53',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .step-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        /* Smooth color transition for dark mode */
        html, body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-white dark:bg-brand-black text-brand-black dark:text-white selection:bg-brand-purple selection:text-white">

    <nav class="fixed top-0 w-full z-50 px-4 py-6 pointer-events-none">
        <div class="max-w-6xl mx-auto flex justify-between items-center bg-brand-black/95 dark:bg-black/80 backdrop-blur-xl border border-white/10 shadow-2xl rounded-2xl px-6 py-3.5 pointer-events-auto">
            <a href="#" onclick="window.scrollTo({ top: 0, behavior: 'smooth' }); return false;" class="flex items-center gap-2 group cursor-pointer hover:opacity-80 transition-opacity">
                <div class="bg-brand-purple p-1 rounded-lg overflow-hidden">
                    <img src="/1080.ico" alt="iFixLabs Logo" class="w-5 h-5 object-contain">
                </div>
                <div class="font-display font-black tracking-tighter text-xl flex items-baseline gap-0.5">
                    <span class="text-white">iFix</span>
                    <span class="text-brand-purple">Labs</span>
                </div>
            </a>

            <div class="hidden md:flex items-center gap-10 text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">
                <a href="#services" class="hover:text-brand-purple transition-colors">Services</a>
                <a href="#reviews" class="hover:text-brand-purple transition-colors">Reviews</a>
                <a href="#coverage" class="hover:text-brand-purple transition-colors">Coverage</a>
            </div>

            <div class="flex items-center gap-4 ml-auto md:ml-0">
                <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-white/10 text-white hover:bg-brand-purple transition-all hover:scale-110 active:scale-95">
                    <i data-lucide="sun" id="sun-icon" class="w-4 h-4 hidden"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-4 h-4"></i>
                </button>

                <a href="https://wa.me/60176198047" target="_blank" class="bg-[#25D366] text-white px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl text-[9px] sm:text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition-all hover:scale-[1.02] active:scale-95 shadow-lg">
                    <i data-lucide="message-circle" class="w-4 h-4"></i>
                    <span>WhatsApp!</span>
                </a>
            </div>
        </div>
    </nav>

    <main>
        <section class="relative pt-32 pb-24 lg:pt-44 overflow-hidden dark:bg-brand-black">
            <div class="max-w-7xl mx-auto px-6 sm:px-8 text-center space-y-8">
                <div class="inline-flex items-center gap-3 bg-brand-purple/10 text-brand-purple px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">
                    <i data-lucide="zap" class="w-3.5 h-3.5 fill-brand-purple"></i>
                    Quality Fixes in Selangor & KL
                </div>
                <h1 class="font-display text-5xl sm:text-7xl lg:text-8xl font-black tracking-tighter leading-[0.85] dark:text-white">
                    Quick <span class="text-brand-purple">Doorstep</span> Repair.
                </h1>
                <p class="text-gray-500 dark:text-gray-400 max-w-lg mx-auto font-medium">
                    iPhone, Android, or PC - we fix it all right at your place. Fast, honest, and reliable. [cite: 757]
                </p>
            </div>
        </section>

        <section id="services" class="py-20 dark:bg-brand-black">
            <div class="max-w-7xl mx-auto px-6 sm:px-8">
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-4" id="services-grid">
                    </div>
            </div>
        </section>

        <section id="inquiry" class="py-24 bg-gray-50 dark:bg-black/20">
            <div class="max-w-2xl mx-auto px-6" id="diagnostic-engine-container">
                <div class="bg-brand-black rounded-[40px] shadow-2xl overflow-hidden p-8" id="diagnostic-engine">
                    <div id="steps-container" class="min-h-[300px] flex flex-col justify-center">
                        <div id="step-1" class="step-transition">
                            <h4 class="text-2xl font-black text-white font-display mb-6">Which device?</h4>
                            <input type="text" id="phoneModel" placeholder="e.g. iPhone 15" class="w-full bg-white/5 border-2 border-transparent focus:border-brand-purple p-4 rounded-2xl text-white outline-none mb-4">
                            <button onclick="goToStep(2)" class="w-full bg-brand-purple text-white p-4 rounded-2xl font-black uppercase tracking-widest text-xs">Next Step</button>
                        </div>
                        <div id="step-2" class="step-transition hidden opacity-0">
                             <h4 class="text-2xl font-black text-white font-display mb-6">What's the issue?</h4>
                             <textarea id="issue" rows="3" class="w-full bg-white/5 border-2 border-transparent focus:border-brand-purple p-4 rounded-2xl text-white outline-none mb-4" placeholder="Explain the problem..."></textarea>
                             <input type="tel" id="whatsapp" placeholder="01XXXXXXXX" class="w-full bg-white/5 border-2 border-transparent focus:border-brand-purple p-4 rounded-2xl text-white outline-none mb-6">
                             <div class="grid grid-cols-2 gap-4">
                                <button onclick="goToStep(1)" class="bg-white/5 text-gray-400 p-4 rounded-2xl font-black uppercase tracking-widest text-xs">Back</button>
                                <button onclick="analyze()" class="bg-brand-purple text-white p-4 rounded-2xl font-black uppercase tracking-widest text-xs">Analyze</button>
                             </div>
                        </div>
                        <div id="step-3" class="step-transition hidden opacity-0 text-center">
                            <div class="bg-green-500/10 p-6 rounded-3xl border border-green-500/20 mb-6">
                                <i data-lucide="check-circle" class="w-10 h-10 text-green-500 mx-auto mb-4"></i>
                                <p id="analysis-summary" class="text-white text-sm font-medium"></p>
                                <p id="analysis-price" class="text-brand-purple font-black mt-2"></p>
                            </div>
                            <a id="whatsapp-link" href="#" target="_blank" class="block w-full bg-brand-purple text-white p-4 rounded-2xl font-black uppercase text-xs mb-4">Click to Repair Now</a>
                            <button onclick="resetEngine()" class="text-gray-500 uppercase text-[10px] font-black">Start Over</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-white dark:bg-brand-black py-12 border-t border-gray-100 dark:border-white/5 text-center">
        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">© <span id="year"></span> iFixLabs Malaysia.</p>
    </footer>

    <script>
        // 1. DATA
        const SERVICES = [
            { title: "Screen Repair", icon: "smartphone", tag: "High Quality", link: "https://wa.me/60176198047", desc: "LCD bleeding or cracks." },
            { title: "Battery Swap", icon: "battery", tag: "Quick Fix", link: "https://wa.me/60176198047", desc: "Fast draining or bloated." },
            { title: "Backglass", icon: "layers", tag: "Pro Finish", link: "/backglasspricelist.html", desc: "Aesthetic restoration." },
            { title: "Charging", icon: "zap", tag: "On-Site", link: "https://wa.me/60176198047", desc: "Port cleaning or swap." },
            { title: "PC/Desktop", icon: "monitor", tag: "New", link: "https://wa.me/60176198047", desc: "Upgrades & Software." },
            { title: "Others", icon: "help-circle", tag: "AI Assist", link: "#inquiry", desc: "We fix everything." }
        ];

        // 2. RENDER SERVICES
        const grid = document.getElementById('services-grid');
        SERVICES.forEach(s => {
            const card = document.createElement('a');
            card.href = s.link;
            card.className = "group p-6 rounded-[32px] bg-brand-light-purple/30 dark:bg-white/5 border border-transparent hover:border-brand-purple transition-all flex flex-col justify-between hover:scale-[1.02]";
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-6">
                        <div class="bg-brand-purple p-2 rounded-xl text-white"><i data-lucide="${s.icon}" class="w-5 h-5"></i></div>
                        <span class="text-[8px] font-black uppercase text-brand-purple/40">${s.tag}</span>
                    </div>
                    <h3 class="font-black text-lg mb-1 dark:text-white">${s.title}</h3>
                    <p class="text-[11px] text-gray-500 font-medium">${s.desc}</p>
                </div>
            `;
            grid.appendChild(card);
        });

        // 3. DARK MODE LOGIC
        function toggleDarkMode() {
            const html = document.documentElement;
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');

            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');

            sunIcon.classList.toggle('hidden', !isDark);
            moonIcon.classList.toggle('hidden', isDark);
            lucide.createIcons();
        }

        // 4. ENGINE LOGIC
        let currentStep = 1;
        function goToStep(step) {
            document.getElementById(`step-${currentStep}`).classList.add('hidden', 'opacity-0');
            document.getElementById(`step-${step}`).classList.remove('hidden');
            setTimeout(() => document.getElementById(`step-${step}`).classList.remove('opacity-0'), 50);
            currentStep = step;
            lucide.createIcons();
        }

        function analyze() {
            const model = document.getElementById('phoneModel').value;
            const issue = document.getElementById('issue').value;
            if(!model || !issue) return alert("Fill everything bruv!");
            
            document.getElementById('analysis-summary').innerText = `Analysis for ${model}: Possible ${issue} fault.`;
            document.getElementById('analysis-price').innerText = "Est: RM150 - RM450";
            document.getElementById('whatsapp-link').href = `https://wa.me/60176198047?text=Fixing ${model} for ${issue}`;
            goToStep(3);
        }

        function resetEngine() {
            document.getElementById('phoneModel').value = '';
            document.getElementById('issue').value = '';
            goToStep(1);
        }

        // 5. INIT
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            }
            document.getElementById('year').innerText = new Date().getFullYear();
            lucide.createIcons();
        });
    </script>
</body>
</html>
