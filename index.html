<body class="bg-white dark:bg-brand-black transition-colors duration-300 selection:bg-brand-purple selection:text-white">

    <nav class="fixed top-0 w-full z-50 px-4 py-6 pointer-events-none">
        <div class="max-w-6xl mx-auto flex justify-between items-center bg-brand-black/95 backdrop-blur-xl border border-white/10 shadow-2xl rounded-2xl px-6 py-3.5 pointer-events-auto">

                <div class="bg-brand-purple p-1 rounded-lg overflow-hidden transition-transform group-hover:scale-110">
                    <img src="/1080.ico" alt="iFixLabs Logo" class="w-5 h-5 object-contain">
                </div>
                <div class="font-display font-black tracking-tighter text-xl flex items-baseline gap-0.5">
                    <span class="text-white">iFix</span>
                    <span class="text-brand-purple">Labs</span>
                </div>
            </a>

            <div class="hidden md:flex items-center gap-10 text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">
                <a href="#services" class="hover:text-brand-purple transition-colors">Services</a>
                <a href="#reviews" class="hover:text-brand-purple transition-colors">Reviews</a>
                <a href="#coverage" class="hover:text-brand-purple transition-colors">Coverage</a>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-white/10 text-white hover:bg-brand-purple transition-all">
                    <i data-lucide="sun" id="sun-icon" class="w-4 h-4 hidden"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-4 h-4"></i>
                </button>

                <a href="https://wa.me/60176198047" target="_blank" class="bg-[#25D366] text-white px-5 py-2.5 rounded-full font-bold text-sm transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-green-500/20 uppercase flex items-center gap-2">
                    <i data-lucide="message-circle" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Whatsapp Us!</span>
                </a>
            </div>
        </div>
    </nav>

    <script>
        // ... Keep all your SERVICES and REVIEWS arrays exactly as they were ...

        // FIXED SCRIPT LOGIC
        function toggleDarkMode() {
            const html = document.documentElement;
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');
        
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
            lucide.createIcons();
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Initializing icons
            lucide.createIcons();
            
            // Initializing theme
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('sun-icon')?.classList.remove('hidden');
                document.getElementById('moon-icon')?.classList.add('hidden');
            }

            // Your original Year and Animation logic
            document.getElementById('year').innerText = new Date().getFullYear();
            
            // Your custom Service Rendering Loop
            const servicesGrid = document.getElementById('services-grid');
            if(servicesGrid) {
                SERVICES.forEach(s => {
                    const div = document.createElement('a');
                    div.href = s.link || '#';
                    div.className = 'group p-4 sm:p-6 rounded-[24px] sm:rounded-[32px] bg-brand-light-purple/30 dark:bg-white/5 border border-transparent hover:border-brand-purple transition-all flex flex-col justify-between transform hover:scale-[1.02]';
                    div.innerHTML = `
                        `;
                    servicesGrid.appendChild(div);
                });
                lucide.createIcons(); // Wake up icons inside the cards
            }
        });
    </script>
</body>
